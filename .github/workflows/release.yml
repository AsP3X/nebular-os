name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  build-binaries:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — native runners where available, cross for the rest
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: nebular-os
            cross: false
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            bin: nebular-os
            cross: false
          - name: linux-i686
            os: ubuntu-latest
            target: i686-unknown-linux-gnu
            archive: tar.gz
            bin: nebular-os
            cross: true
          - name: linux-armv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            archive: tar.gz
            bin: nebular-os
            cross: true
          - name: linux-riscv64
            os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            archive: tar.gz
            bin: nebular-os
            cross: true
          - name: linux-ppc64le
            os: ubuntu-latest
            target: powerpc64le-unknown-linux-gnu
            archive: tar.gz
            bin: nebular-os
            cross: true
          - name: linux-s390x
            os: ubuntu-latest
            target: s390x-unknown-linux-gnu
            archive: tar.gz
            bin: nebular-os
            cross: true
          # Windows — MSVC on windows-latest
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: nebular-os.exe
            cross: false
          - name: windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            bin: nebular-os.exe
            cross: false
          - name: windows-i686
            os: windows-latest
            target: i686-pc-windows-msvc
            archive: zip
            bin: nebular-os.exe
            cross: false
          # macOS — Intel and Apple Silicon
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            bin: nebular-os
            cross: false
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            bin: nebular-os
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Strip (Unix, native)
        if: matrix.archive == 'tar.gz' && matrix.cross == false
        run: strip "target/${{ matrix.target }}/release/${{ matrix.bin }}"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGING="nebular-os-${VERSION}-${{ matrix.name }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGING/"
          tar -czf "${STAGING}.tar.gz" -C . "$STAGING"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $staging = "nebular-os-$version-${{ matrix.name }}"
          New-Item -ItemType Directory -Path $staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" $staging/
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}
          compression-level: 0

  prepare-release:
    name: Prepare release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum nebular-os-* > SHA256SUMS.txt
          ls -la

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/*
          compression-level: 0
          retention-days: 7

  docker:
    name: Docker (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
